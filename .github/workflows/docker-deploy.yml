name: Deploy Frontend via ECR + SSM

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "299349364198"
  ECR_REPO: "dev/own-tenant-portal"
  IMAGE_NAME: "299349364198.dkr.ecr.ap-south-1.amazonaws.com/dev/own-tenant-portal"

jobs:
  deploy:
    runs-on: React

    permissions:
      id-token: write
      contents: read

    steps:

      # Checkout
      - name: Checkout
        uses: actions/checkout@v4


      # AWS Login
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::299349364198:role/OIDC-own-tenant-portal
          aws-region: ${{ env.AWS_REGION }}


      # Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com


      # Set Image Tag
      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV


      # Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # Build & Push
      - name: Build & Push to ECR
        working-directory: application-code/web-tier
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            --push .


      - name: Deploy via SSM (Stable Updated)
        run: |
          aws ssm send-command \
            --instance-ids i-0833b1d3f14c4cd38 \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Frontend via ECR" \
            --parameters '{
              "commands": [
                "set -ex",
      
                "# Start Docker",
                "sudo systemctl enable docker",
                "sudo systemctl start docker",
      
                "# Verify CLI and Docker",
                "aws --version",
                "docker --version",
      
                "# Login to ECR using official AWS command",
                "aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin 299349364198.dkr.ecr.ap-south-1.amazonaws.com",
      
                "# Stop & remove existing container",
                "sudo docker stop web || true",
                "sudo docker rm web || true",
      
                "# Pull latest image from ECR",
                "sudo docker pull 299349364198.dkr.ecr.ap-south-1.amazonaws.com/dev/own-tenant-portal:latest",
      
                "# Run container (with ARM64 platform for T4g)",
                "sudo docker run -d --name web --platform linux/arm64 -p 80:80 --restart always 299349364198.dkr.ecr.ap-south-1.amazonaws.com/dev/own-tenant-portal:latest",
      
                "# Show running containers and images",
                "sudo docker ps",
                "sudo docker images"
              ]
            }'
